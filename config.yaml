# PyWirewalker configuration.
# Edit the paths + deployment metadata for your deployment. Paths may use ~ (home)
# and are expanded. You can override the two paths without editing this file via the
# WW_RSK and WW_OUTPUT_DIR environment variables, or point at a different file with
#   python process_wirewalker.py --level all --config /path/to/other.yaml

# --- Input / output paths (machine-specific) ----------------------------------------
rsk_file:   ~/NOPP/data/202605_NOPP-Aleutians_RBR-Concerto-Serial213752_DeploymentData.rsk
output_dir: ~/NOPP/data/wirewalker_processing      # L1/ L2/ L3/ are created here
basename:   NOPP-Aleutians_RBR-Concerto-213752     # output filename prefix

# --- Deployment / instrument metadata -----------------------------------------------
mooring:    NOPP-Aleutians
instrument: RBRconcerto3 S/N 213752
latitude:   49.5        # deg N   (TEOS-10 conversions)
longitude:  -159.0      # deg E   (i.e. 159 W)
atmospheric_pressure_dbar: 10.1325   # sea pressure = total pressure - this (rsk ATMOSPHERE)

# --- Acquisition --------------------------------------------------------------------
sampling_hz: 2.0

# --- Conductivity-cell thermal-mass de-spiking (RBR correctTM; Lueck & Picklo 1990) -
thermal_mass:
  alpha: 0.04
  beta_per_s: 0.1       # relaxation time tau = 1/beta = 10 s
  gamma: 1.0            # dC/dT, with conductivity in mS/cm

# --- Gridding -----------------------------------------------------------------------
grid:
  l2_dz_m: 0.5          # L2 vertical bin
  zmin_m: 0.0
  zmax_m: 500.0
  l3_dz_m: 1.0          # L3 vertical bin
  l3_dt: 30min          # L3 time bin
  l3_interp_max_gap_bins: 1   # gap-filled L3 companion: fill single empty 30-min bins only

# --- Buoyancy frequency N^2 = (g/rho0) d(sigma0)/dz ---------------------------------
n2_vertical_smoothing_m: 5.0  # vertical boxcar applied to sigma0 before differentiating
gravity: 9.81
